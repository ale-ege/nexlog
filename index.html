    <script type="application/ld+json">

          {
            "@type": "Question",
            "name": "O que é uma rota dedicada?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Uma rota dedicada é uma operação de transporte realizada com frequência definida, atendendo regiões, lojas, clientes ou unidades de forma programada. Esse modelo traz mais previsibilidade, controle e organização para empresas que possuem entregas frequentes no Rio Grande do Sul."
            }
          },
          {
            "@type": "Question",
            "name": "Quando vale a pena contratar um caminhão dedicado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "O caminhão dedicado é indicado quando a empresa possui demanda recorrente, precisa de maior controle sobre horários, rotas e entregas, ou deseja reduzir a dependência de fretes avulsos do dia a dia."
            }
          },
          {
            "@type": "Question",
            "name": "A NEXLOG atende fretes avulsos?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "O foco da NEXLOG está em operações recorrentes: rotas dedicadas, caminhão dedicado e transporte programado. Demandas pontuais podem ser avaliadas, mas a prioridade é construir relações de parceria com empresas que precisam de operação logística estável."
            }
          },
          {
            "@type": "Question",
            "name": "A NEXLOG atua em todo o Rio Grande do Sul?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sim. A NEXLOG é uma parceira logística regional no Rio Grande do Sul, estruturando rotas dedicadas e operações programadas conforme a necessidade de cada empresa. Algumas operações também incluem conexões com outros estados, mediante análise."
            }
          },
          {
            "@type": "Question",
            "name": "A operação possui seguro?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A NEXLOG trabalha com responsabilidade operacional, incluindo cobertura de seguro para carga e caminhão conforme as características da operação contratada."
            }
          },
          {
            "@type": "Question",
            "name": "Como funciona o acompanhamento da carga?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cada operação conta com comunicação direta com quem opera, além de acompanhamento da execução. O nível de monitoramento é definido conforme o modelo contratado: rota dedicada, caminhão dedicado ou operação programada."
            }
          },
          {
            "@type": "Question",
            "name": "A NEXLOG emite documentação de transporte?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sim. A NEXLOG atua com emissão documental e formalização adequada da operação, incluindo CIOT quando aplicável, garantindo o padrão profissional exigido por empresas contratantes."
            }
          },
